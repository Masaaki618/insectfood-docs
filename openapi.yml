openapi: "3.0.0"
info:
  title: 昆虫食初心者ガイド API
  version: "1.0.0"
  description: 昆虫食初心者向け診断アプリのAPI仕様書

servers:
  - url: https://your-api.run.app/api/v1
    description: 本番環境
  - url: http://localhost:8080/api/v1
    description: ローカル環境

paths:
  /insects:
    get:
      summary: 昆虫一覧取得
      description: 登録されている昆虫の一覧を取得する
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insect"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /insects/{id}:
    get:
      summary: 昆虫詳細取得
      description: 昆虫の詳細情報とレーダーチャートスコアを取得する
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 昆虫のID
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsectDetail"
        "404":
          description: 昆虫が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /questions:
    get:
      summary: 診断質問取得
      description: カテゴリ別にランダムで6問取得する（visual:2問 / physical:2問 / mental:2問）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /diagnosis:
    post:
      summary: 診断実行
      description: カテゴリ別スコアを送信し、AIがレコメンドした昆虫とコメントを返す
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosisRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosisResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

components:
  schemas:
    InsectDetail:
      allOf:
        - $ref: "#/components/schemas/Insect"
        - type: object
          properties:
            ai_comment:
              type: string
              description: Claude Haiku 4.5が生成した昆虫の食レポコメント
              example: ナッツ系の香ばしい風味が特徴。粉末状なので初めての方でも抵抗なく楽しめます。
            radar_chart:
              $ref: "#/components/schemas/RadarChart"

    RadarChart:
      type: object
      properties:
        umami_score:
          type: integer
          minimum: 1
          maximum: 5
          example: 3
        bitter_score:
          type: integer
          minimum: 1
          maximum: 5
          example: 1
        egu_score:
          type: integer
          minimum: 1
          maximum: 5
          example: 1
        flavor_score:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        kimo_score:
          type: integer
          minimum: 1
          maximum: 5
          example: 1

    Insect:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: コオロギパウダー
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
          example: 1
        introduction:
          type: string
          example: 粉末状なので虫とわからない初心者向け
        taste:
          type: string
          example: ナッツ系
        texture:
          type: string
          example: サラサラ
        insect_img:
          type: string
          nullable: true
          example: https://example.com/images/cricket.png

    Question:
      type: object
      properties:
        id:
          type: integer
          example: 1
        body:
          type: string
          example: 虫が出てくる映像や画像を抵抗なく見られる
        category:
          type: string
          enum:
            - visual
            - physical
            - mental
          example: visual

    DiagnosisRequest:
      type: object
      required:
        - scores
      properties:
        scores:
          type: object
          required:
            - visual
            - physical
            - mental
          properties:
            visual:
              type: integer
              minimum: 0
              maximum: 2
              example: 2
            physical:
              type: integer
              minimum: 0
              maximum: 2
              example: 1
            mental:
              type: integer
              minimum: 0
              maximum: 2
              example: 0

    DiagnosisResponse:
      type: object
      properties:
        insect:
          $ref: "#/components/schemas/Insect"
        ai_comment:
          type: string
          description: Claude Haiku 4.5が生成したパーソナライズコメント
          example: 挑戦する気持ちが強いあなたに、白くてまるっとしたシルクワームはいかがでしょう。クリーミーな味わいにきっと驚くはずです。

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
              example: invalid score value

  responses:
    BadRequest:
      description: リクエスト不正
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerError:
      description: サーバーエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: AI APIエラー（リトライ3回後）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
